<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 320px;
            padding: 24px;
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            border-radius: 12px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }
        .title {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 16px;
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">C</div>
        <div class="title">ClipGrab Pro</div>
    </div>
    
    <button id="downloadBtn" class="btn">
        <span class="loader" id="loader"></span>
        <span>Download Current Video</span>
    </button>
    
    <div id="status" class="status">Ready to capture</div>

    <script src="popup.js"></script>
</body>
</html>
